name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish artifacts to GitHub Releases
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            script: dist:mac:arm64
            artifact_name: assistant-desk-mac-arm64
          - runner: macos-14
            arch: x64
            script: dist:mac:x64
            artifact_name: assistant-desk-mac-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap

  publish-release:
    if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: assistant-desk-mac-arm64
          path: release-artifacts/arm64

      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: assistant-desk-mac-x64
          path: release-artifacts/x64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/arm64/*
            release-artifacts/x64/*