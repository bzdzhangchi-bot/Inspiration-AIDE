<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspiration Preview Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5efe4;
        --panel: rgba(255, 252, 247, 0.82);
        --text: #1d1b16;
        --muted: #6f6658;
        --accent: #cc5c2f;
        --line: rgba(29, 27, 22, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(204, 92, 47, 0.18), transparent 28%),
          linear-gradient(135deg, #f8f1e6, #efe5d6 55%, #e8dcc9);
      }

      main {
        width: min(920px, calc(100vw - 40px));
        margin: 48px auto;
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 70px rgba(74, 48, 28, 0.14);
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 12px 0 10px;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 0.96;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin-top: 28px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(29, 27, 22, 0.08);
      }

      .card strong {
        display: block;
        margin-bottom: 8px;
      }

      .tip {
        margin-top: 24px;
        padding: 16px 18px;
        border-left: 4px solid var(--accent);
        background: rgba(204, 92, 47, 0.08);
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Preview Demo</div>
      <h1>你正在看一个内置示例页面</h1>
      <p>
        这个文件用来帮助你快速确认 Inspiration 的 HTML 预览能力已经正常工作。
        你可以直接修改文案、颜色或布局，右侧预览会立刻更新。
      </p>

      <section class="grid">
        <article class="card">
          <strong>试一试</strong>
          修改标题文案，看预览是否同步变化。
        </article>
        <article class="card">
          <strong>再试一试</strong>
          改一下背景色或圆角，感受编辑和预览联动。
        </article>
        <article class="card">
          <strong>下一步</strong>
          回到 `新手引导.md` 继续体验 Chat、Terminal 和 Git。
        </article>
      </section>

      <div class="tip">
        提示：如果你在真实项目里有 HTML、Markdown 或 PDF 文件，也可以用同样方式快速预览。
      </div>
    </main>
  </body>
</html>
